<!DOCTYPE html>
<html>

<head>
  <title>Contact - Dark Mode</title>
  <link rel="stylesheet" href="contact_dark.css">
</head>

<body>

  <ul class="navbar">
    <li><a href="../main/cv_dark.html">CV</a></li>
    <li><a href="../hobbies/hobbies_dark.html">Hobbies</a></li>
    <li><a href="../beliefs/beliefs_dark.html">Beliefs</a></li>
    <li><a href="../feedback/form_dark.html">Feedback</a></li>
    <li><a class="active" href="contact_dark.html">Contact</a></li>
  </ul>

  <div class="container">

    <h1>Contact Us</h1>

    <form action="../main/cv_dark.html" method="post">

      <fieldset>
        <legend>Send a Message</legend>

        <label>Name:</label>
        <input type="text" name="name" required>

        <label>Email:</label>
        <input type="email" name="email" required>

        <label>Phone:</label>
        <input type="tel" name="phone">

        <label>Subject:</label>
        <input type="text" name="subject">

        <label>Message:</label>
        <textarea name="message" rows="5" required></textarea>

        <input type="submit" value="Send Message">
      </fieldset>

    </form>

    <div class="buttons">
      <a href="../main/cv_dark.html" class="btn">Back to CV</a>
      <a href="contact_light.html" class="btn">Switch to Light Mode</a>
    </div>

  </div>

  <div class="footer">
    <p>This is a personal academic portfolio website created by Vrajkumar Shah.</p>
  </div>

</body>

</html>
