<!DOCTYPE html>
<html lang="en-US">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Dark Mode</title>
  <link rel="stylesheet" href="contact_dark.css">
</head>

<body class="has-fixed-header">

  <header class="site-header">
    <nav class="site-nav" aria-label="Main navigation">
      <ul class="nav-links">
        <li><a href="../main/cv_dark.html">Home</a></li>
        <li><a href="../education/education_dark.html">Education</a></li>
        <li><a href="../experience/experience_dark.html">Experience</a></li>
        <li><a href="../achievements/achievements_dark.html">Achievements</a></li>
        <li><a href="../hobbies/hobbies_dark.html">Hobbies</a></li>
        <li><a href="../beliefs/beliefs_dark.html">Beliefs</a></li>
        <li><a href="../feedback/form_dark.html">Feedback</a></li>
        <li><a class="active" href="contact_dark.html">Contact</a></li>
      </ul>
      <span class="nav-brand">Vrajkumar Shah</span>
    </nav>
  </header>

  <header class="page-banner">
    <h1 class="page-banner__title">Contact</h1>
    <p class="page-banner__subtitle">Send a message</p>
  </header>

  <main class="container">

    <form action="../main/cv_dark.html" method="post" class="contact-form">

      <fieldset>
        <legend>Send a Message</legend>

        <div class="form-row form-row--2">
          <div class="form-field">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>
          </div>
          <div class="form-field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
          </div>
        </div>

        <div class="form-row form-row--2">
          <div class="form-field">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" name="phone">
          </div>
          <div class="form-field">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject">
          </div>
        </div>

        <div class="form-field">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" required></textarea>
        </div>

        <div class="form-actions">
          <input type="submit" value="Send Message">
        </div>
      </fieldset>

    </form>

    <div class="buttons">
      <a href="../main/cv_dark.html" class="btn">Back to CV</a>
      <a href="contact_light.html" class="btn">Switch to Light Mode</a>
    </div>

  </main>

  <footer class="site-footer">
    <p>This is an Academic Portfolio Website made by Vrajkumar Shah.</p>
  </footer>

</body>

</html>
