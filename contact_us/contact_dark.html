<!DOCTYPE html>
<html>
<head>
<title>Contact Us - Light Mode</title>
<link rel="stylesheet" href="contact_dark.css">
</head>

<body>

<div class="container">

<h1>Contact Us</h1>

<form action="../main/cv_dark.html" method="post">

<fieldset>
<legend>Send a Message</legend>

<label>Name:</label>
<input type="text" name="name" required>

<label>Email:</label>
<input type="email" name="email" required>

<label>Phone:</label>
<input type="tel" name="phone">

<label>Subject:</label>
<input type="text" name="subject">

<label>Message:</label>
<textarea name="message" rows="5" required></textarea>

<input type="submit" value="Send Message">

</fieldset>

</form>

<div class="buttons">
<a href="../main/cv_dark.html" class="btn">Back to CV</a>
<a href="contact_light.html" class="btn">Switch to Light Mode</a>
</div>

</div>

</body>
</html>
