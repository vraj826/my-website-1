<!DOCTYPE html>
<html lang="en-US">
<head>

<title>Feedback Form</title>

<style>
table {
  font-family: arial, sans-serif;
  border-collapse: collapse;
  width: 75%;
}
td, th {
  border: 1px solid #000;
  text-align: left;
  padding: 8px;
}
</style>

</head>

<body>

<h1>Feedback Form</h1>

<h3>Please write your thoughts about my CV — Anonymous feedback allowed!</h3>

<form action="cv.html" target="_blank" method="get">

<fieldset>
<legend>Personal Information (Optional — Anonymous Allowed)</legend>

<label>First Name:</label><br>
<input type="text" name="fname"><br><br>

<label>Last Name:</label><br>
<input type="text" name="lname"><br><br>

<label>Email (Optional):</label><br>
<input type="email" name="email"><br><br>

<label>Gender:</label><br>
<input type="radio" name="gender" value="Male"> Male<br>
<input type="radio" name="gender" value="Female"> Female<br>
<input type="radio" name="gender" value="Other"> Other<br><br>

<label>Profession:</label><br>
<select name="profession">
<option>Student</option>
<option>Working Professional</option>
<option>Self-Employed</option>
</select><br><br>

</fieldset>

<fieldset>
<legend>Your Thoughts on my CV</legend>

<label>Overall Rating:</label><br>
1
<input type="range" name="rating" min="1" max="5">
5
<br><br>

<label>What did you like?</label><br>
<textarea name="likes" rows="4" cols="40"></textarea><br><br>

<label>Suggestions for improvement:</label><br>
<textarea name="suggestions" rows="4" cols="40"></textarea><br><br>

<label>Would you recommend this CV?</label><br>
<input type="checkbox" name="recommend" value="Yes"> Yes<br><br>

<label>Upload reference (optional):</label><br>
<input type="file" name="file"><br><br>

<input type="submit" value="Submit Feedback">

</fieldset>

</form>

</body>
</html>
